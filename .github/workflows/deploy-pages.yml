name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          mkdir -p dist
          cp index.html dist/
          cp -R src assets dist/
          if [ -n "$FIREBASE_CONFIG_JSON" ]; then
            printf '%s\n' "$FIREBASE_CONFIG_JSON" > dist/firebase-config.json
            printf '{"firebaseConfig":"present-secret","generatedAt":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > dist/config-status.json
          else
            echo "Missing GitHub secret FIREBASE_CONFIG_JSON" >&2
            printf '{"firebaseConfig":"missing","generatedAt":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > dist/config-status.json
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
